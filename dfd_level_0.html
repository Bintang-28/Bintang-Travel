    <button class="btn" onclick="downloadImage()">Unduh Gambar DFD</button>

    <script>
        function downloadImage() {
            const container = document.getElementById('diagram-container');
            
            // Ubah tombol sementara jika ada
            const btn = document.querySelector('.btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses Unduhan...';

            html2canvas(container, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'DFD_Level_0_BintangTravel.png';
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                btn.innerHTML = originalText;
            }).catch(err => {
                alert("Gagal mengunduh gambar: " + err);
                btn.innerHTML = originalText;
            });
        }
    </script>
