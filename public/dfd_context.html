    <!-- Interactive Scripts for Editing & Downloading -->
    <script>
        // --- 1. Inline Text Editor Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const textElements = document.querySelectorAll('text');
            textElements.forEach(textEl => {
                textEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const currentText = textEl.textContent;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = currentText;
                    
                    const rect = textEl.getBoundingClientRect();
                    
                    input.style.position = 'absolute';
                    input.style.left = `${window.scrollX + rect.left - 5}px`;
                    input.style.top = `${window.scrollY + rect.top - 2}px`;
                    input.style.width = `${Math.max(rect.width + 30, 100)}px`;
                    input.style.fontSize = window.getComputedStyle(textEl).fontSize;
                    input.style.fontFamily = window.getComputedStyle(textEl).fontFamily;
                    input.style.fontWeight = window.getComputedStyle(textEl).fontWeight;
                    input.style.textAlign = 'center';
                    input.style.border = '2px solid #2563eb';
                    input.style.borderRadius = '6px';
                    input.style.outline = 'none';
                    input.style.background = '#ffffff';
                    input.style.boxShadow = '0 4px 6px -1px rgb(0 0 0 / 0.1)';
                    input.style.zIndex = '1000';
                    
                    document.body.appendChild(input);
                    input.focus();
                    input.select();
                    
                    const saveValue = () => {
                        const newValue = input.value.trim();
                        if (newValue !== '') {
                            textEl.textContent = newValue;
                        }
                        input.remove();
                    };
                    
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            saveValue();
                        } else if (e.key === 'Escape') {
                            input.remove();
                        }
                    });
                    
                    input.addEventListener('blur', () => {
                        saveValue();
                    });
                });
            });
        });

        // --- 2. Download SVG Logic ---
        function downloadSVG() {
            const svg = document.getElementById('dfd-svg');
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(svg);
            
            // Add xml namespace to ensure valid standalone SVG
            if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            source = '<?xml version="1.0" standalone="no"?>\r\n' + source;

            const blob = new Blob([source], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = "Diagram_Konteks_Bintang_Travel.svg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- 3. Download PNG (High Resolution) Logic ---
        function downloadPNG() {
            const svg = document.getElementById('dfd-svg');
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(svg);
            
            // Convert SVG to data URI
            const svgBlob = new Blob([source], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);
            
            // Create Image to draw on Canvas
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement("canvas");
                // Multiply dimensions by 2 for higher resolution output
                canvas.width = 1200 * 2;
                canvas.height = 800 * 2;
                const ctx = canvas.getContext("2d");
                
                // Fill background white explicitly just in case
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw scaled SVG onto canvas
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Cleanup URL
                URL.revokeObjectURL(url);
                
                // Export to PNG data URL and trigger download
                const imgURI = canvas.toDataURL("image/png");
                const a = document.createElement("a");
                a.href = imgURI;
                a.download = "Diagram_Konteks_Bintang_Travel_HighRes.png";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            
            img.src = url;
        }
    </script>
