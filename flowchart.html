<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowchart Sistem Bintang Travel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background: #f0f2f5; 
            color: #333;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            margin-bottom: 50px; 
        }
        h2 { 
            color: #34495e; 
            margin-bottom: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            background: #fff;
        }
    </style>
</head>
<body>

    <h1>Flowchart Aplikasi Bintang Travel</h1>

    <div class="container">
        <h2>Diagram Alir Role: Pelanggan (Client)</h2>
        <img src="Flowchart_Pelanggan.png" alt="Flowchart Pelanggan">
    </div>

    <div class="container">
        <h2>Diagram Alir Role: Administrator (Admin Travel)</h2>
        <img src="Flowchart_Admin.png" alt="Flowchart Admin">
    </div>

    <div class="container">
        <h2>Diagram Alir Role: Owner (Pemilik)</h2>
        <img src="Flowchart_Owner.png" alt="Flowchart Owner">
    </div>

    <div class="container">
        <h2>Diagram Alir Role: Super Admin (Admin IT)</h2>
        <img src="Flowchart_SuperAdmin.png" alt="Flowchart Super Admin">
    </div>

</body>
</html>
