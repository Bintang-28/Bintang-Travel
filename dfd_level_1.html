<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFD Level 1 - Sistem Rental Mobil</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-download {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
        #canvas-container {
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: auto;
            max-width: 100%;
            border: 1px solid #ddd;
        }
        svg {
            display: block;
        }
        text {
            font-family: Arial, sans-serif;
        }
        .entity {
            font-size: 18px;
            font-weight: bold;
        }
        .process-title {
            font-size: 14px;
            font-weight: bold;
        }
        .datastore-title {
            font-size: 13px;
            font-weight: bold;
        }
        .label {
            font-size: 11px;
            fill: #111;
            paint-order: stroke;
            stroke: white;
            stroke-width: 4px;
            stroke-linecap: butt;
            stroke-linejoin: miter;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Data Flow Diagram (DFD) Level 1</h2>
        <button class="btn-download" onclick="downloadImage()">Unduh Gambar (PNG)</button>
    </div>

    <div id="canvas-container">
        <!-- Layout Lingkaran Presisi (Menempel 100% pada batas kurva) -->

                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
                </marker>
            </defs>

            <g fill="none" stroke="#333" stroke-width="1.5">
                <!-- CLIENT FLOWS -->
                <path d="M 200 150 H 720" marker-end="url(#arrow)"/>

                <path d="M 200 240 H 260 V 330 H 422.6" marker-end="url(#arrow)"/>
                <text x="341" y="326" text-anchor="middle" class="label">Input data reservasi mobil</text>

                <path d="M 200 260 H 280 V 210 H 1000 V 310 H 1030.8" marker-end="url(#arrow)"/>
                <text x="640" y="206" text-anchor="middle" class="label">Upload bukti pembayaran denda</text>

                <path d="M 200 280 H 300 V 230 H 1000 V 330 H 1022.6" marker-end="url(#arrow)"/>
                <text x="640" y="226" text-anchor="middle" class="label">Input tiket bantuan &amp; chat</text>

                <path d="M 1020 350 H 980 V 250 H 320 V 300 H 200" marker-end="url(#arrow)"/>

                <path d="M 1022.6 370 H 960 V 270 H 340 V 320 H 200" marker-end="url(#arrow)"/>
                <text x="650" y="266" text-anchor="middle" class="label">Informasi balasan tiket &amp; chat</text>

                <path d="M 420 350 H 360 V 340 H 200" marker-end="url(#arrow)"/>
                <text x="280" y="336" text-anchor="middle" class="label">Informasi status &amp; cetak reservasi</text>

                <path d="M 480 572.6 V 360 H 200" marker-end="url(#arrow)"/>
                <text x="340" y="356" text-anchor="middle" class="label">Informasi ketersediaan &amp; detail mobil</text>

                <!-- ADMIN FLOWS -->
                <path d="M 200 630 H 422.6" marker-end="url(#arrow)"/>
                <text x="311" y="626" text-anchor="middle" class="label">Input data mobil &amp; driver</text>

                <path d="M 200 650 H 420" marker-end="url(#arrow)"/>

                <path d="M 422.6 670 H 200" marker-end="url(#arrow)"/>

                <path d="M 430.8 690 H 200" marker-end="url(#arrow)"/>
                <text x="315" y="686" text-anchor="middle" class="label">Informasi notifikasi reminder dokumen</text>

                <path d="M 200 590 H 280 V 370 H 422.6" marker-end="url(#arrow)"/>

                <path d="M 430.8 390 H 260 V 570 H 200" marker-end="url(#arrow)"/>

                <path d="M 200 750 H 360 V 170 H 722.6" marker-end="url(#arrow)"/>

                <path d="M 730.8 190 H 380 V 770 H 200" marker-end="url(#arrow)"/>

                <!-- SUPER ADMIN FLOWS -->

                <path d="M 1400 130 H 877.4" marker-end="url(#arrow)"/>

                <!-- OWNER FLOWS -->

                <text x="1284" y="606" text-anchor="middle" class="label">Request laporan periode tertentu</text>

                <path d="M 1177.4 630 H 1400" marker-end="url(#arrow)"/>
                <text x="1288" y="626" text-anchor="middle" class="label">dashboard &amp; grafik tren reservasi</text>

                <path d="M 1180 650 H 1400" marker-end="url(#arrow)"/>
                <text x="1290" y="646" text-anchor="middle" class="label">laporan laba bersih &amp; KPI</text>

                <path d="M 1177.4 670 H 1400" marker-end="url(#arrow)"/>
                <text x="1288" y="666" text-anchor="middle" class="label">Informasi laporan utilitas &amp; kinerja kendaraan</text>

                <path d="M 1400 550 H 1250 V 350 H 1180" marker-end="url(#arrow)"/>
                <text x="1325" y="546" text-anchor="middle" class="label">Request verifikasi pembayaran</text>

                <!-- Ke D1 -->
                <path d="M 800 230 V 260" marker-end="url(#arrow-dashed)"/>
                <!-- Ke D2, D3, D6, D8 dari P2 -->

                <path d="M 577.4 630 H 620" marker-end="url(#arrow-dashed)"/>
                <path d="M 577.4 670 H 620" marker-end="url(#arrow-dashed)"/>
                <path d="M 552.9 710 H 620" marker-end="url(#arrow-dashed)"/>
                <!-- Ke D4 dari P3 -->

                <!-- Ke D5, D7 dari P4 -->

                <path d="M 1120 427.4 V 500" marker-end="url(#arrow-dashed)"/>

                <path d="M 1100 490 V 570" marker-end="url(#arrow-dashed)"/>
                <path d="M 720 670 H 1022.6" marker-end="url(#arrow-dashed)"/>

            <!-- DATA STORES -->

                <rect x="620" y="575" width="100" height="30" />
                <line x1="640" y1="575" x2="640" y2="605" />

                <rect x="620" y="615" width="100" height="30" />
                <line x1="640" y1="615" x2="640" y2="645" />
                <text x="680" y="635" text-anchor="middle" class="datastore-title" fill="#111" stroke="none">D3 Drivers</text>

                <rect x="620" y="335" width="100" height="30" />
                <line x1="640" y1="335" x2="640" y2="365" />
                <text x="680" y="355" text-anchor="middle" class="datastore-title" fill="#111" stroke="none">D4 Reserv.</text>

                <rect x="1030" y="460" width="100" height="30" />
                <line x1="1050" y1="460" x2="1050" y2="490" />
                <text x="1090" y="480" text-anchor="middle" class="datastore-title" fill="#111" stroke="none">D5 Paymnt.</text>

                <rect x="620" y="655" width="100" height="30" />
                <line x1="640" y1="655" x2="640" y2="685" />
                <text x="680" y="675" text-anchor="middle" class="datastore-title" fill="#111" stroke="none">D6 Maint.</text>

                <rect x="1070" y="500" width="100" height="30" />
                <line x1="1090" y1="500" x2="1090" y2="530" />

                <line x1="640" y1="695" x2="640" y2="725" />

            </g>

            <!-- PROCESSES (Circles) -->

                <text x="800" y="165" text-anchor="middle" class="process-title" fill="#111" stroke="none">Pengguna</text>

                <circle cx="500" cy="650" r="80" />
                <text x="500" y="645" text-anchor="middle" class="process-title" fill="#111" stroke="none">2.0 Kelola</text>
                <text x="500" y="665" text-anchor="middle" class="process-title" fill="#111" stroke="none">Master Data</text>

                <circle cx="500" cy="350" r="80" />
                <text x="500" y="345" text-anchor="middle" class="process-title" fill="#111" stroke="none">3.0 Transaksi</text>
                <text x="500" y="365" text-anchor="middle" class="process-title" fill="#111" stroke="none">&amp; Reservasi</text>

                <circle cx="1100" cy="350" r="80" />
                <text x="1100" y="345" text-anchor="middle" class="process-title" fill="#111" stroke="none">4.0 Pembayaran</text>
                <text x="1100" y="365" text-anchor="middle" class="process-title" fill="#111" stroke="none">&amp; Tiket</text>

                <circle cx="1100" cy="650" r="80" />
                <text x="1100" y="645" text-anchor="middle" class="process-title" fill="#111" stroke="none">5.0 Pelaporan</text>

            </g>

            <!-- EXTERNAL ENTITIES -->
            <rect x="50" y="100" width="150" height="250" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
            <text x="125" y="230" text-anchor="middle" class="entity" fill="#111">Admin /</text>
            <text x="125" y="255" text-anchor="middle" class="entity" fill="#111">Pegawai</text>
            <!-- Wait, user original entities are client, admin, super admin, owner. I will change text back. -->
            <rect x="50" y="100" width="150" height="250" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
            <text x="125" y="230" text-anchor="middle" class="entity" fill="#111">Client</text>

            <rect x="50" y="550" width="150" height="250" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
            <text x="125" y="680" text-anchor="middle" class="entity" fill="#111">Admin</text>

            <rect x="1400" y="100" width="150" height="100" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
            <text x="1475" y="155" text-anchor="middle" class="entity" fill="#111">Super Admin</text>

            <rect x="1400" y="550" width="150" height="250" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
            <text x="1475" y="680" text-anchor="middle" class="entity" fill="#111">Owner</text>

        </svg>
    </div>

    <script>
        function downloadImage() {
            const svg = document.getElementById('dfd-svg');
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(svg);
            
            if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
            }

            source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
            const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
            
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = svg.width.baseVal.value;
                canvas.height = svg.height.baseVal.value;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                const a = document.createElement('a');
                a.download = "dfd_level_1.png";
                a.href = canvas.toDataURL("image/png");
                a.click();
            };
            img.src = url;
        }
    </script>
</body>
</html>
